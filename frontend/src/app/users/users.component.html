<header class="page-header">
  <div>
    <p class="eyebrow">Seguranca</p>
    <h1>Usuarios e perfis</h1>
  </div>
</header>

@if (error()) {
  <p class="alert">{{ error() }}</p>
}

<section class="panel">
  <div class="panel-title">
    <h2>Usuarios cadastrados</h2>
    <span>{{ users().length }} registros</span>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr><th>Nome</th><th>Email</th><th>Perfil</th><th>Ativo</th><th></th></tr>
      </thead>
      <tbody>
        @for (user of users(); track user.id) {
          <tr>
            <td><input [(ngModel)]="user.fullName" /></td>
            <td>{{ user.email }}</td>
            <td>
              <select [(ngModel)]="user.role">
                @for (role of roles; track role) {
                  <option [value]="role">{{ role }}</option>
                }
              </select>
            </td>
            <td>
              <label class="check inline"><input type="checkbox" [(ngModel)]="user.isActive" /> Ativo</label>
            </td>
            <td class="actions"><button type="button" class="ghost" (click)="save(user)">Salvar</button></td>
          </tr>
        } @empty {
          <tr><td colspan="5" class="empty">Nenhum usuario encontrado.</td></tr>
        }
      </tbody>
    </table>
  </div>
</section>
