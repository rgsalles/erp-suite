<main class="auth-page">
  <div class="language-toggle auth-language" [attr.aria-label]="'app.language' | t">
    <button type="button" [class.active]="language.language() === 'pt'" (click)="setLanguage('pt')">{{ 'app.pt' | t }}</button>
    <button type="button" [class.active]="language.language() === 'en'" (click)="setLanguage('en')">{{ 'app.en' | t }}</button>
  </div>
  <section class="auth-panel">
    <div>
      <p class="eyebrow">{{ 'auth.newAccess' | t }}</p>
      <h1>{{ 'auth.registerTitle' | t }}</h1>
      <p class="muted">{{ 'auth.registerHelp' | t }}</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="stack">
      <label>
        {{ 'auth.fullName' | t }}
        <input formControlName="fullName" autocomplete="name" />
      </label>

      <label>
        {{ 'common.email' | t }}
        <input type="email" formControlName="email" autocomplete="email" />
      </label>

      <label>
        {{ 'common.password' | t }}
        <input type="password" formControlName="password" autocomplete="new-password" />
      </label>

      <label>
        {{ 'common.role' | t }}
        <select formControlName="role">
          @for (role of roles; track role) {
            <option [value]="role">{{ ('role.' + role) | t }}</option>
          }
        </select>
      </label>

      @if (error) {
        <p class="alert">{{ error }}</p>
      }

      <button class="primary" type="submit" [disabled]="loading">
        {{ loading ? ('auth.registering' | t) : ('auth.registerAndLogin' | t) }}
      </button>
    </form>

    <p class="muted">{{ 'auth.hasUser' | t }} <a routerLink="/login">{{ 'auth.login' | t }}</a></p>
  </section>
</main>
