<main class="auth-page">
  <section class="auth-panel">
    <div>
      <p class="eyebrow">Novo acesso</p>
      <h1>Cadastro de usuario</h1>
      <p class="muted">O primeiro usuario vira administrador. Depois disso, novos cadastros entram como operador, salvo quando feitos por admin.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="stack">
      <label>
        Nome completo
        <input formControlName="fullName" autocomplete="name" />
      </label>

      <label>
        Email
        <input type="email" formControlName="email" autocomplete="email" />
      </label>

      <label>
        Senha
        <input type="password" formControlName="password" autocomplete="new-password" />
      </label>

      <label>
        Perfil
        <select formControlName="role">
          @for (role of roles; track role) {
            <option [value]="role">{{ role }}</option>
          }
        </select>
      </label>

      @if (error) {
        <p class="alert">{{ error }}</p>
      }

      <button class="primary" type="submit" [disabled]="loading">
        {{ loading ? 'Cadastrando...' : 'Cadastrar e entrar' }}
      </button>
    </form>

    <p class="muted">Ja tem usuario? <a routerLink="/login">Entrar</a></p>
  </section>
</main>
